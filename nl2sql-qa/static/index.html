<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL2SQL 智能问数系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            color: #38bdf8;
        }

        .chat-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
        }

        .user-msg {
            background: #1e40af;
            margin-left: 40px;
        }

        .ai-msg {
            background: #334155;
            margin-right: 40px;
        }

        .sql-block {
            background: #0f172a;
            color: #68d391;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            margin: 8px 0;
            overflow-x: auto;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0;
        }

        .result-table th {
            background: #475569;
            padding: 8px;
            text-align: left;
        }

        .result-table td {
            padding: 8px;
            border-top: 1px solid #475569;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 16px;
        }

        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            color: #f87171;
        }

        .status {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧠 NL2SQL 智能问数系统</h1>
        <p style="text-align:center;color:#94a3b8;margin-bottom:16px;">
            用自然语言查询数据库 — 试试问"北京有多少用户？"
        </p>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <input id="questionInput" type="text" placeholder="输入你想查询的问题... (回车发送)"
                onkeydown="if(event.key==='Enter')sendQuery()" />
            <button id="sendBtn" onclick="sendQuery()">发送</button>
        </div>
    </div>

    <script>
        function addMessage(text, className) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message ' + className;
            div.innerHTML = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function renderTable(columns, data) {
            if (!data || data.length === 0) return '<p>没有查询到匹配数据</p>';

            let html = `<p>查询到 <strong>${data.length}</strong> 条结果：</p>`;
            html += '<table class="result-table"><tr>';
            columns.forEach(col => html += `<th>${col}</th>`);
            html += '</tr>';
            data.forEach(row => {
                html += '<tr>';
                columns.forEach(col => html += `<td>${row[col] ?? '-'}</td>`);
                html += '</tr>';
            });
            html += '</table>';
            return html;
        }

        async function sendQuery() {
            const input = document.getElementById('questionInput');
            const btn = document.getElementById('sendBtn');
            const question = input.value.trim();

            if (!question) return;
            input.disabled = btn.disabled = true;

            // 显示用户消息
            addMessage(`<strong>🧑 你：</strong> ${question}`, 'user-msg');

            // 创建 AI 消息占位
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = '<strong>🤖 AI：</strong> <span class="status">正在分析...</span>';
            const chatBox = document.getElementById('chatBox');
            chatBox.appendChild(aiDiv);

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留不完整的行

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        switch (data.type) {
                            case 'generating_sql':
                                aiDiv.innerHTML = '<strong>🤖 AI：</strong> 🔄 ' + data.message;
                                break;
                            case 'sql_generated':
                                aiDiv.innerHTML = '<strong>🤖 AI：</strong> 📝 生成 SQL：<div class="sql-block">' + data.sql + '</div>';
                                break;
                            case 'executing':
                                aiDiv.innerHTML += '<p>⏳ ' + data.message + '</p>';
                                break;
                            case 'retrying':
                                aiDiv.innerHTML += '<p>⚠️ ' + data.message + '</p>';
                                break;
                            case 'result':
                                aiDiv.innerHTML = '<strong>🤖 AI：</strong> 📝 生成 SQL：<div class="sql-block">' + data.sql + '</div>';
                                aiDiv.innerHTML += renderTable(data.columns, data.data);
                                break;
                            case 'error':
                                aiDiv.innerHTML = '<strong>🤖 AI：</strong> <span class="error-msg">❌ ' + data.message + '</span>';
                                break;
                            case 'done':
                                // 完成
                                break;
                        }
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                }
            } catch (error) {
                aiDiv.innerHTML = '<strong>🤖 AI：</strong> <span class="error-msg">❌ 连接错误：' + error.message + '</span>';
            }

            input.value = '';
            input.disabled = btn.disabled = false;
            input.focus();
        }
    </script>
</body>

</html>
